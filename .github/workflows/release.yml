name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-35 build-tools;35.0.0 ndk;27.0.12077973"

      - name: Build mcon_bridge native binary
        run: |
          NDK_BIN="$ANDROID_HOME/ndk/27.0.12077973/toolchains/llvm/prebuilt/linux-x86_64/bin"
          mkdir -p app/src/main/jniLibs/arm64-v8a
          "$NDK_BIN/aarch64-linux-android30-clang" \
            src/mcon_bridge.c \
            -o app/src/main/jniLibs/arm64-v8a/libmcon_bridge.so \
            -static -O2 -Wall \
            -Wl,-z,max-page-size=16384 -Wl,-z,common-page-size=16384
          "$NDK_BIN/llvm-strip" app/src/main/jniLibs/arm64-v8a/libmcon_bridge.so

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/keystore.jks"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/keystore.jks" >> "$GITHUB_ENV"

      - name: Grant gradlew exec
        run: chmod +x ./gradlew

      - name: Assemble release
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename APK
        id: rename
        run: |
          APK="$(ls app/build/outputs/apk/release/*.apk | head -1)"
          VER="${GITHUB_REF_NAME#v}"
          OUT="mcon2codm-${VER:-dev}.apk"
          cp "$APK" "$OUT"
          echo "apk=$OUT" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcon2codm-release
          path: ${{ steps.rename.outputs.apk }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.rename.outputs.apk }}
          draft: false
          generate_release_notes: true
